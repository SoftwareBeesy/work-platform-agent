name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum
      - name: Tidy modules
        run: go mod tidy
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1 -race
